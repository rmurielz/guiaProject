<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Aislado de Tom-Select</title>

    <!-- Dependencias de Estilos (desde CDN, igual que en tu proyecto) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

    <style>
        /* ==========================================================================
           COPIA EXACTA DE LOS ESTILOS DE main.css
           ========================================================================== */
        :root {
            --primary: #3b82f6;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3bd;
            --body-bg: #111827;
            --card-bg: #1f2937;
            --card-border: #374151;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-primary);
            padding: 2rem;
        }
        .form-container{
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            border: 1px solid var(--card-border);
            max-width: 900px;
            margin: auto;
        }
        .form-label {
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        /* --- ESTILOS DE TOM-SELECT --- */
        .ts-wrapper .ts-control {
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            font-size: 0.9rem;
            min-height: 38px;
            box-shadow: none;
        }
        .ts-wrapper.focus .ts-control {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        /* --- LA REGLA EN CUESTIÓN --- */
        .ts-wrapper .ts-control input,
        .ts-wrapper.single .ts-control .item {
            color: var(--text-primary);
            font-size: 0.9rem;
            padding: 0;
            margin: 0;
            background-color: transparent; /* La clave */
        }

        .ts-wrapper .ts-control input::placeholder {
            color: #6b7280;
        }
        .ts-dropdown {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }
        .ts-dropdown .option {
            color: var(--text-secondary);
            padding: 0.6rem 0.75rem;
        }
        .ts-dropdown .option.active,
        .ts-dropdown .option:hover {
            background-color: var(--primary);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h3>Prueba Aislada de Tom-Select</h3>
        <p>Si esto se ve y funciona bien, el problema es el caché del navegador en tu proyecto principal.</p>
        <hr class="my-3">

        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label for="pais-select" class="form-label">País</label>
                <select id="pais-select" placeholder="Escriba para buscar un país..."></select>
            </div>
            <div class="col-md-4">
                <label for="division-select" class="form-label">Departamento / Estado / Provincia</label>
                <select id="division-select" placeholder="Primero seleccione un país..." disabled></select>
            </div>
            <div class="col-md-4">
                <label for="ciudad-select" class="form-label">Ciudad</label>
                <select id="ciudad-select" placeholder="Primero seleccione una división..." disabled></select>
            </div>
        </div>
    </div>

    <!-- Dependencias de JS (desde CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <script>
        // Script mínimo para inicializar Tom-Select con datos de prueba
        document.addEventListener('DOMContentLoaded', () => {
            new TomSelect('#pais-select', {
                options: [
                    {id: 'CO', text: 'Colombia'},
                    {id: 'US', text: 'United States'},
                    {id: 'ES', text: 'España'}
                ],
                create: false
            });
            new TomSelect('#division-select', {});
            new TomSelect('#ciudad-select', {});
        });
    </script>

</body>
</html>
